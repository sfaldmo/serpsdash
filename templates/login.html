<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERP Dashboard — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Raleway', -apple-system, sans-serif;
      background: #1a1f2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 12px;
      padding: 48px 40px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      text-align: center;
    }
    .logo-mark { font-size: 28px; font-weight: 700; color: #1a1f2e; letter-spacing: 3px; }
    .logo-sub  { font-size: 11px; color: #607d8b; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; margin-bottom: 36px; }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #dde3ea;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input[type="password"]:focus { border-color: #4fc3f7; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: #1a1f2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #2e3650; }
    .error {
      margin-top: 14px;
      padding: 10px;
      background: #ffebee;
      color: #c62828;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-mark">SERP</div>
    <div class="logo-sub">Dashboard</div>
    <form method="post">
      <input type="password" name="password" placeholder="Enter password" autofocus>
      <button type="submit">Enter</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
